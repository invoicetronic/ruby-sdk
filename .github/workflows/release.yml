name: Create Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  github-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-gem:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler-cache: true

      # Publish only the gem via RubyGems OIDC trusted publishing. We deliberately avoid
      # `rake release` (rubygems/release-gem): its git ceremony pushes a `release-tmp` branch
      # that diverges from the regenerated SDK repo every release and fails non-fast-forward
      # BEFORE the gem is ever pushed. The git tag and GitHub release are already created by the
      # SDK generation pipeline, so only `gem push` is needed here.
      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@v1.0.0

      - name: Build and push gem
        run: |
          gem build invoicetronic_sdk.gemspec
          gem push invoicetronic_sdk-*.gem
